<!-- Uygulamalar/blok.html -->
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Blok Okuma + ChatGPT Metin Üretme</title>
<style>
/* (CSS AYNI - DEĞİŞMEDİ) */
body{font-family:Arial,sans-serif;margin:0;padding:0;height:100vh;}
#container{display:flex;height:100vh;}
#settings{width:260px;background:#f0f0f0;border-right:1px solid #ccc;display:flex;flex-direction:column;height:100vh;}
#settingsContent{flex:1;overflow-y:auto;padding:15px;}
#wordStats,#quizStatsPanel{background:#e8e8e8;padding:8px;font-size:12px;border-top:1px solid #ccc;}
.section{margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #ccc;}
#settings label,#settings input,#settings select,#settings button{width:100%;margin-bottom:6px;font-size:12px;box-sizing:border-box;}
#settings h3{margin:0 0 6px;font-size:14px;}
#settings button{padding:6px;border:none;border-radius:4px;cursor:pointer;}
.primary{background:#007bff;color:white}
.secondary{background:#6c757d;color:white}
#settings input[type="radio"],#settings input[type="checkbox"]{width:auto !important;display:inline-block !important;margin:0 6px 0 0 !important;}
.textModeRow{display:flex;flex-direction:column;align-items:flex-start;gap:4px;margin-bottom:8px;}
.radioRow{display:flex;align-items:center;gap:6px;font-size:12px;}
#rightPanel{flex:1;display:flex;flex-direction:column;background:white;}
#textDisplay{flex:1;padding:20px;font-family:monospace;font-size:20px;background:white;overflow-y:auto;white-space:pre-wrap;line-height:1.6;}
.hiddenWord{color:#f5f5f5}
.visibleWord{color:black}
.line{display:block}
#questionContainer{padding:10px 20px 10px 20px;overflow-y:auto;}
.question{margin-bottom:15px;}
.optionBtn{padding:6px;border:1px solid #ccc;margin:3px 0;cursor:pointer;}
.optionBtn.correct{background:#c9f7c2}
.optionBtn.wrong{background:#f8d7da}
#readingDoneBtn,#finishBtn,#prepareQuestionsBtn{
margin:0 20px 10px 20px;padding:8px 12px;border:none;border-radius:4px;cursor:pointer;display:none;
}
#readingDoneBtn{background:#17a2b8;color:white;}
#finishBtn{background:#28a745;color:white;}
#prepareQuestionsBtn{background:#ffc107;color:black;}
</style>
</head>

<body>

<div id="container">

<div id="settings">
<div id="settingsContent">
<h3>Metin</h3>
<input id="topicInput" placeholder="Konu gir">
<button id="generateTextBtn" class="primary">Metin Oluştur</button>

<h3>Okuma</h3>
<button id="startBtn" class="primary">Başlat</button>
<button id="readingDoneBtn">Okuma Bitti</button>
</div>
</div>

<div id="rightPanel">
<div id="textDisplay"></div>

<button id="prepareQuestionsBtn">Soruları Hazırla</button>
<button id="finishBtn">Testi Bitir</button>

<div id="questionContainer"></div>
</div>

</div>

<script>
let rawText="";
let words=[];
let currentIndex=0;
let timer=null;

let currentQuestions=[];
let userAnswers=[];

/* ========= METİN ========= */
generateTextBtn.onclick=async function(){

const topic=topicInput.value;
if(!topic){alert("Konu gir");return;}

const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer YOUR_API_KEY"
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[{role:"user",content:`${topic} hakkında metin yaz`}]
})
});

const data=await res.json();
rawText=data.choices[0].message.content;

loadText(rawText);

readingDoneBtn.style.display="none";
prepareQuestionsBtn.style.display="none";
questionContainer.innerHTML="";
finishBtn.style.display="none";
};

/* ========= METİN YÜKLE ========= */
function loadText(txt){
textDisplay.innerHTML="";
words=[];
txt.split(" ").forEach(w=>{
const span=document.createElement("span");
span.innerText=w+" ";
span.className="hiddenWord";
words.push(span);
textDisplay.appendChild(span);
});
}

/* ========= OKUMA ========= */
startBtn.onclick=function(){
if(!words.length){alert("Önce metin");return;}
currentIndex=0;
showWord();
};

function showWord(){
if(currentIndex>=words.length){
readingDoneBtn.style.display="inline-block";
return;
}
words.forEach(w=>w.className="hiddenWord");
words[currentIndex].className="visibleWord";
currentIndex++;
timer=setTimeout(showWord,200);
}

/* ========= OKUMA BİTTİ ========= */
readingDoneBtn.onclick=function(){
readingDoneBtn.style.display="none";
prepareQuestionsBtn.style.display="inline-block";
textDisplay.innerHTML="";
};

/* ========= SORU HAZIRLA ========= */
prepareQuestionsBtn.onclick=async function(){

prepareQuestionsBtn.style.display="none";
questionContainer.innerHTML="Sorular hazırlanıyor...";

const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer YOUR_API_KEY"
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[{
role:"user",
content:`Aşağıdaki metne göre 5 soru üret JSON:

${rawText}

{questions:[{q:"",options:["","","",""],answer:0}]}`
}]
})
});

const data=await res.json();
const txt=data.choices[0].message.content;
const json=JSON.parse(txt);

currentQuestions=json.questions;
userAnswers=new Array(currentQuestions.length).fill(null);

renderQuestions();
finishBtn.style.display="inline-block";
};

/* ========= SORULAR ========= */
function renderQuestions(){
questionContainer.innerHTML="";
currentQuestions.forEach((q,i)=>{
const div=document.createElement("div");
div.className="question";

const p=document.createElement("p");
p.innerText=(i+1)+") "+q.q;
div.appendChild(p);

q.options.forEach((opt,oi)=>{
const btn=document.createElement("button");
btn.className="optionBtn";
btn.innerText=opt;

btn.onclick=function(){
userAnswers[i]=oi;
};

div.appendChild(btn);
});

questionContainer.appendChild(div);
});
}

/* ========= TEST ========= */
finishBtn.onclick=function(){
let correct=0;
currentQuestions.forEach((q,i)=>{
if(userAnswers[i]==q.answer) correct++;
});
alert("Doğru: "+correct);
};
</script>

</body>
</html>
