<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Okuma + Soru Sistemi</title>

<style>
body{font-family:Arial;margin:0}
#container{display:flex;height:100vh}

/* SOL */
#left{width:250px;background:#f0f0f0;padding:10px}

/* SAĞ */
#right{flex:1;display:flex;flex-direction:column}

/* METİN */
#text{flex:1;padding:20px;font-size:20px;line-height:1.6}

/* BUTON */
button{margin-top:6px;padding:8px;cursor:pointer}

/* SORU */
.option{display:block;margin:4px 0;padding:6px;border:1px solid #ccc}
.correct{background:#c9f7c2}
.wrong{background:#f8d7da}
</style>
</head>

<body>

<div id="container">

<div id="left">
  <h3>Metin</h3>
  <input id="topic" placeholder="Konu"><br>
  <button onclick="generateText()">Metin Oluştur</button>

  <h3>Okuma</h3>
  <button onclick="startReading()">Okumayı Başlat</button>
  <button id="doneBtn" onclick="readingDone()" style="display:none;">Okuma Bitti</button>

  <button id="prepareBtn" onclick="prepareQuestions()" style="display:none;">
    Soruları Hazırla
  </button>
</div>

<div id="right">
  <div id="text"></div>
  <div id="questions"></div>
  <button id="finishBtn" onclick="finishQuiz()" style="display:none;">Testi Bitir</button>
</div>

</div>

<script>
let rawText="";
let questions=[];
let answers=[];

/* ========= METİN OLUŞTUR ========= */
async function generateText(){
  const topic=document.getElementById("topic").value;
  if(!topic){alert("Konu gir");return;}

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer YOUR_API_KEY"
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[{role:"user",content:`${topic} hakkında 300 kelimelik metin yaz`}]
    })
  });

  const data=await res.json();
  rawText=data.choices[0].message.content;

  document.getElementById("text").innerText=rawText;

  document.getElementById("doneBtn").style.display="inline-block";
  document.getElementById("prepareBtn").style.display="none";
  document.getElementById("questions").innerHTML="";
  document.getElementById("finishBtn").style.display="none";
}

/* ========= OKUMA ========= */
function startReading(){
  if(!rawText){alert("Önce metin");return;}
  alert("Oku ve bitince 'Okuma Bitti' bas");
}

function readingDone(){
  document.getElementById("doneBtn").style.display="none";
  document.getElementById("prepareBtn").style.display="inline-block";
}

/* ========= SORU HAZIRLA ========= */
async function prepareQuestions(){

  document.getElementById("prepareBtn").style.display="none";
  document.getElementById("questions").innerHTML="Hazırlanıyor...";

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer YOUR_API_KEY"
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[{
        role:"user",
        content:`Aşağıdaki metne göre 5 soru hazırla JSON olarak:

${rawText}

format:
{questions:[{q:"",options:["","","",""],answer:0}]}
`
      }]
    })
  });

  const data=await res.json();
  const text=data.choices[0].message.content;
  const json=JSON.parse(text);

  questions=json.questions;
  answers=new Array(questions.length).fill(null);

  renderQuestions();

  document.getElementById("finishBtn").style.display="inline-block";
}

/* ========= SORULARI GÖSTER ========= */
function renderQuestions(){
  const div=document.getElementById("questions");
  div.innerHTML="";

  questions.forEach((q,i)=>{
    const qDiv=document.createElement("div");

    const p=document.createElement("p");
    p.innerText=(i+1)+") "+q.q;
    qDiv.appendChild(p);

    q.options.forEach((opt,oi)=>{
      const btn=document.createElement("button");
      btn.className="option";
      btn.innerText=opt;

      btn.onclick=()=>{
        answers[i]=oi;
      };

      qDiv.appendChild(btn);
    });

    div.appendChild(qDiv);
  });
}

/* ========= TEST BİTİR ========= */
function finishQuiz(){
  let correct=0;

  questions.forEach((q,i)=>{
    if(answers[i]==q.answer) correct++;
  });

  alert("Doğru: "+correct+"/"+questions.length);
}
</script>

</body>
</html>
