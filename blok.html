<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Blok Okuma + ChatGPT Metin Üretme</title>

<style>
body{
  font-family:Arial,sans-serif;
  margin:0;
  padding:0;
  height:100vh;
}
#container{
  display:flex;
  height:100vh;
}

/* SOL PANEL */
#settings{
  width:260px;
  background:#f0f0f0;
  border-right:1px solid #ccc;
  display:flex;
  flex-direction:column;
}
#settingsContent{
  flex:1;
  overflow-y:auto;
  padding:15px;
}
.section{
  margin-bottom:12px;
  padding-bottom:8px;
  border-bottom:1px solid #ccc;
}

/* SAĞ PANEL */
#rightPanel{
  flex:1;
  display:flex;
  flex-direction:column;
  background:white;
}

#textDisplay{
  flex:1;
  padding:20px;
  font-family:monospace;
  font-size:20px;
  overflow-y:auto;
  white-space:pre-wrap;
  line-height:1.6;
}

.hiddenWord{color:#f5f5f5}
.visibleWord{color:black}

/* BUTONLAR */
#readingDoneBtn,
#createQuestionsBtn,
#finishBtn{
  margin:0 20px 10px 20px;
  padding:8px 12px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-size:14px;
  align-self:flex-start;
}

#readingDoneBtn{ background:#17a2b8; color:white; }
#createQuestionsBtn{ background:#ffc107; }
#finishBtn{ background:#28a745; color:white; display:none; }
</style>
</head>

<body>

<div id="container">

  <div id="settings">
    <div id="settingsContent">
      <div class="section">
        <button id="generateTextBtn">Metin Oluştur</button>
      </div>

      <div class="section">
        <button id="startBtn">Başlat</button>
        <button id="pauseBtn">Duraklat</button>
        <button id="stopBtn">Durdur</button>
      </div>
    </div>
  </div>

  <div id="rightPanel">
    <div id="textDisplay"></div>

    <button id="readingDoneBtn">Okuma Bitti</button>

    <!-- ✅ DOĞRU YER -->
    <button id="createQuestionsBtn" style="display:none;">
      Soruları Oluştur
    </button>

    <button id="finishBtn">Testi Bitir</button>

    <div id="questionContainer"></div>
  </div>

</div>

<script>

/* ===== GLOBAL ===== */
const textDisplay = document.getElementById("textDisplay");
const readingDoneBtn = document.getElementById("readingDoneBtn");
const createQuestionsBtn = document.getElementById("createQuestionsBtn");
const finishBtn = document.getElementById("finishBtn");
const questionContainer = document.getElementById("questionContainer");

let words = [];
let currentIndex = 0;
let rawText = "";
let quizPhase = "reading";

/* ===== METİN ===== */
document.getElementById("generateTextBtn").onclick = () => {
  rawText = "Bu örnek bir metindir. Okuma tamamlandıktan sonra soru oluşturma butonu çıkacaktır.";
  loadText(rawText);
};

function loadText(txt){
  textDisplay.innerHTML = "";
  words = [];
  currentIndex = 0;

  txt.split(" ").forEach(w=>{
    const span = document.createElement("span");
    span.textContent = w + " ";
    span.className = "hiddenWord";
    words.push(span);
    textDisplay.appendChild(span);
  });
}

/* ===== OKUMA ===== */
document.getElementById("startBtn").onclick = ()=>{
  currentIndex = 0;
  showNext();
};

function showNext(){
  if(currentIndex >= words.length){
    finishReading();
    return;
  }

  words.forEach(w=>w.className="hiddenWord");
  words[currentIndex].className="visibleWord";
  currentIndex++;

  setTimeout(showNext,200);
}

/* ===== OKUMA BİTTİ ===== */
function finishReading(){
  quizPhase = "waitingForQuestions";

  createQuestionsBtn.style.display = "inline-block"; // ✅ ANA NOKTA
}

/* Manuel bitirme */
readingDoneBtn.onclick = ()=>{
  finishReading();
};

/* ===== SORU OLUŞTUR ===== */
createQuestionsBtn.onclick = ()=>{
  createQuestionsBtn.style.display = "none";
  quizPhase = "questions";

  questionContainer.innerHTML = `
    <div class="question">
      <p>1) Metnin konusu nedir?</p>
      <button>a) Deneme</button>
      <button>b) Hikaye</button>
      <button>c) Açıklama</button>
    </div>
  `;

  finishBtn.style.display = "inline-block";
};

/* ===== TEST BİTİR ===== */
finishBtn.onclick = ()=>{
  alert("Test tamamlandı");
};

</script>

</body>
</html>
